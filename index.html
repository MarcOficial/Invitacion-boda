<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Boda Marc & Judith</title>

<style>
  body {
    margin: 0;
    background: #f7f2f5;
    font-family: "Georgia", serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* CONTENEDOR */
  .container {
    position: relative;
    width: 360px;
    height: 280px;
  }

  /* SOBRE */
  .envelope {
    width: 100%;
    height: 100%;
    background: white;
    border: 2px solid #e3c7d8;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.6s ease;
  }

  /* TAPA */
  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: #f1d9e6;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    transition: transform 0.7s ease;
  }

  /* CORAZÓN CON CERRADURA */
  .heart-lock {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: #d46a8c;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 34px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(212,106,140,0.4);
    transition: 0.2s ease;
  }

  .heart-lock:hover {
    transform: translate(-50%, -50%) scale(1.1);
  }

  /* LLAVE */
  .key {
    position: absolute;
    width: 60px;
    top: 60%;
    left: -80px;
    opacity: 0;
    transition: all 1s ease;
  }

  /* CARTA A PANTALLA COMPLETA */
  .letter-full {
    position: fixed;
    top: 100%;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    padding: 40px 20px;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transition: all 1s ease;
    text-align: center;
  }

  .letter-full h1 {
    font-size: 2.4rem;
    color: #b45d7a;
    margin-bottom: 10px;
  }

  .letter-full p {
    font-size: 1.1rem;
    color: #444;
  }

  /* ESTADOS AL ABRIR */
  .unlock .key {
    left: 50%;
    top: 45%;
    opacity: 1;
    transform: translate(-50%, -50%) rotate(20deg);
  }

  .open .flap {
    transform: rotateX(180deg);
  }

  .open .letter-full {
    top: 0;
    opacity: 1;
  }

  .open .heart-lock {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<div class="container">
  <div class="envelope" id="envelope">
    <div class="flap"></div>

    <!-- CORAZÓN CON CERRADURA -->
    <div class="heart-lock" id="lock">🔒</div>

    <!-- LLAVE -->
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" class="key" id="key" />

    <!-- CARTA COMPLETA -->
    <div class="letter-full" id="letter">
      <h1>Marc & Judith</h1>
      <p>Tenemos el honor de invitarte a nuestra boda.</p>
      <p><strong>12 de septiembre de 2026 · 17:30 h</strong></p>
      <p>Finca Son Mir, Mallorca</p>
    </div>
  </div>
</div>

<script>
  const lock = document.getElementById("lock");
  const key = document.getElementById("key");
  const envelope = document.getElementById("envelope");

  lock.addEventListener("click", () => {
    envelope.classList.add("unlock");

    setTimeout(() => {
      envelope.classList.add("open");
    }, 1200);
  });
</script>

</body>
</html>
