<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Boda Marc & Judith</title>

<style>
  body {
    margin: 0;
    font-family: "Georgia", serif;
    background: #f7f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    position: relative;
    width: 340px;
    height: 260px;
  }

  .envelope {
    width: 100%;
    height: 100%;
    background: #fff;
    border: 2px solid #e3c7d8;
    border-radius: 12px;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
    transition: transform 0.6s ease;
  }

  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: #f1d9e6;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    transition: transform 0.6s ease;
  }

  .heart-btn {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #d46a8c;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    color: white;
    font-size: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 8px 20px rgba(212,106,140,0.4);
    transition: transform 0.2s ease;
  }

  .heart-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
  }

  .letter {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    opacity: 0;
    transition: all 0.7s ease;
    text-align: center;
  }

  .open .flap {
    transform: rotateX(180deg);
  }

  .open .letter {
    top: 10%;
    opacity: 1;
  }

  .open .heart-btn {
    opacity: 0;
    pointer-events: none;
  }

  h1 {
    margin: 0;
    font-size: 1.8rem;
    color: #b45d7a;
  }

  .amp {
    color: #d46a8c;
  }

  p {
    font-size: 0.95rem;
    color: #444;
  }

</style>
</head>

<body>

<div class="container">
  <div class="envelope" id="envelope">
    <div class="flap"></div>

    <button class="heart-btn" id="openBtn">❤</button>

    <div class="letter">
      <h1>Marc <span class="amp">&amp;</span> Judith</h1>
      <p>Tenemos el honor de invitarte a nuestra boda.</p>
      <p><strong>12 de septiembre de 2026 · 17:30 h</strong></p>
      <p>Finca Son Mir, Mallorca</p>
    </div>
  </div>
</div>

<script>
  document.getElementById("openBtn").addEventListener("click", () => {
    document.getElementById("envelope").classList.add("open");
  });
</script>

</body>
</html>
