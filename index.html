<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boda Marc & Judith</title>

<style>
  body {
    margin: 0;
    background: #f7f2f5;
    font-family: "Georgia", serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* CONTENEDOR */
  .container {
    position: relative;
    width: 360px;
    height: 280px;
  }

  /* SOBRE */
  .envelope {
    width: 100%;
    height: 100%;
    background: white;
    border: 2px solid #e3c7d8;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  /* TAPA */
  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: #f1d9e6;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    transition: transform 0.7s ease;
  }

  /* CORAZÓN */
  .heart-btn {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #d46a8c;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    color: white;
    font-size: 34px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 8px 20px rgba(212,106,140,0.4);
    transition: 0.2s ease;
  }

  .heart-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
  }

  /* CARTA DIVIDIDA EN DOS */
  .letter-half {
    position: fixed;
    top: 0;
    width: 50%;
    height: 100%;
    background: white;
    z-index: 10;
    transition: transform 1s ease;
    box-shadow: 0 0 40px rgba(0,0,0,0.15);
  }

  .left-half {
    left: 0;
    transform: translateX(0);
  }

  .right-half {
    right: 0;
    transform: translateX(0);
  }

  /* ANIMACIÓN DE APERTURA */
  .open-left {
    transform: translateX(-100%);
  }

  .open-right {
    transform: translateX(100%);
  }

  /* CONTENIDO DE LA INVITACIÓN */
  .invitation {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 90%;
    max-width: 600px;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    transition: opacity 1.2s ease;
    z-index: 5;
  }

  .invitation.show {
    opacity: 1;
  }

  .invitation h1 {
    font-size: 2.4rem;
    color: #b45d7a;
    margin-bottom: 10px;
  }

  .invitation p {
    font-size: 1.1rem;
    color: #444;
    margin-bottom: 8px;
  }

</style>
</head>

<body>

<!-- CARTA DIVIDIDA (INICIALMENTE OCULTA) -->
<div class="letter-half left-half" id="leftHalf" style="display:none;"></div>
<div class="letter-half right-half" id="rightHalf" style="display:none;"></div>

<!-- CONTENIDO DE LA INVITACIÓN -->
<div class="invitation" id="invitation">
  <h1>Marc & Judith</h1>
  <p>Tenemos el honor de invitarte a nuestra boda.</p>
  <p><strong>10 de mayo de 2040 · 12:30 h</strong></p>
  <p>Finca Son Sampol, Mallorca</p>
</div>

<!-- SOBRE -->
<div class="container">
  <div class="envelope" id="envelope">
    <div class="flap" id="flap"></div>
    <button class="heart-btn" id="openBtn">❤</button>
  </div>
</div>

<script>
  const openBtn = document.getElementById("openBtn");
  const flap = document.getElementById("flap");
  const leftHalf = document.getElementById("leftHalf");
  const rightHalf = document.getElementById("rightHalf");
  const invitation = document.getElementById("invitation");

  openBtn.addEventListener("click", () => {
    // Abrir tapa del sobre
    flap.style.transform = "rotateX(180deg)";
    openBtn.style.opacity = "0";

    // Mostrar carta dividida
    setTimeout(() => {
      leftHalf.style.display = "block";
      rightHalf.style.display = "block";
    }, 400);

    // Animar apertura de la carta
    setTimeout(() => {
      leftHalf.classList.add("open-left");
      rightHalf.classList.add("open-right");
    }, 600);

    // Mostrar invitación
    setTimeout(() => {
      invitation.classList.add("show");
    }, 1400);
  });
</script>

</body>
</html>
