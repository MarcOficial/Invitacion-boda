<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boda Marc & Judith</title>

<style>
  body {
    margin: 0;
    background: #f7f2f5;
    font-family: "Georgia", serif;
    overflow: hidden;
  }

  /* INTRO A PANTALLA COMPLETA */
  .intro {
    position: fixed;
    inset: 0;
    background: #f7f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
  }

  /* SOBRE A PANTALLA COMPLETA */
  .envelope {
    width: 100vw;
    height: 100vh;
    background: white;
    border: 3px solid #e3c7d8;
    position: relative;
    overflow: hidden;
  }

  /* TAPA DEL SOBRE */
  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: #f1d9e6;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    transition: transform 0.8s ease;
  }

  /* CORAZÓN */
  .heart-btn {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #d46a8c;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    color: white;
    font-size: 55px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 8px 20px rgba(212,106,140,0.4);
    transition: 0.2s ease;
    z-index: 10;
  }

  .heart-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
  }

  /* CARTA DIVIDIDA */
  .letter-half {
    position: fixed;
    top: 0;
    width: 50%;
    height: 100%;
    background: white;
    z-index: 60;
    transition: transform 1s ease;
    display: none;
  }

  .left-half {
    left: 0;
    transform: translateX(0);
  }

  .right-half {
    right: 0;
    transform: translateX(0);
  }

  .open-left {
    transform: translateX(-100%);
  }

  .open-right {
    transform: translateX(100%);
  }

  /* TEXTO DE LA INVITACIÓN */
  .invitation {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 90%;
    max-width: 600px;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    transition: opacity 1.2s ease;
    z-index: 55;
  }

  .invitation.show {
    opacity: 1;
  }

  .invitation h1 {
    font-size: 3rem;
    color: #b45d7a;
    margin-bottom: 10px;
  }

  .invitation p {
    font-size: 1.3rem;
    color: #444;
    margin-bottom: 8px;
  }
</style>
</head>

<body>

<!-- CARTA DIVIDIDA -->
<div class="letter-half left-half" id="leftHalf"></div>
<div class="letter-half right-half" id="rightHalf"></div>

<!-- TEXTO DE LA INVITACIÓN -->
<div class="invitation" id="invitation">
  <h1>Marc & Judith</h1>
  <p>Nos casamos</p>
  <p><strong>10 de mayo de 2040</strong></p>
</div>

<!-- SOBRE A PANTALLA COMPLETA -->
<div class="intro" id="intro">
  <div class="envelope">
    <div class="flap" id="flap"></div>
    <button class="heart-btn" id="openBtn">❤</button>
  </div>
</div>

<script>
  const openBtn = document.getElementById("openBtn");
  const flap = document.getElementById("flap");
  const leftHalf = document.getElementById("leftHalf");
  const rightHalf = document.getElementById("rightHalf");
  const invitation = document.getElementById("invitation");
  const intro = document.getElementById("intro");

  openBtn.addEventListener("click", () => {
    // Abrir tapa
    flap.style.transform = "rotateX(180deg)";
    openBtn.style.opacity = "0";

    // Mostrar carta dividida
    setTimeout(() => {
      leftHalf.style.display = "block";
      rightHalf.style.display = "block";
    }, 400);

    // Abrir mitades
    setTimeout(() => {
      leftHalf.classList.add("open-left");
      rightHalf.classList.add("open-right");
    }, 600);

    // Mostrar texto
    setTimeout(() => {
      invitation.classList.add("show");
    }, 1200);

    // Ocultar sobre
    setTimeout(() => {
      intro.style.display = "none";
    }, 2000);
  });
</script>

</body>
</html>
